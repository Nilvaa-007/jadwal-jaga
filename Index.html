<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Jaga Medis v3.6</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link class="manifest" href="data:application/manifest+json,{%22name%22:%22Jadwal%20Jaga%20v3%22,%22short_name%22:%22JadwalJaga3%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#f8fafc%22,%22theme_color%22:%22#f8fafc%22}">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .drawer-transition { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center p-4 antialiased relative overflow-x-hidden">

  <div class="w-full max-w-md bg-white rounded-[2.5rem] p-6 shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-slate-100 mt-2 mb-6 flex flex-col justify-between min-h-[85vh]">
    
    <div>
      <div class="flex items-center justify-between mb-6">
        <button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 border border-slate-100 text-slate-600">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
        </button>
        <h1 class="text-lg font-bold text-slate-800 tracking-tight">Atur Jadwal Jaga v3.6</h1>
        <button onclick="resetSemua()" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-2 rounded-xl active:scale-95">Reset</button>
      </div>
      
      <div class="mb-6">
        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-2.5">Nama Dokter</label>
        <div class="grid grid-cols-2 gap-3">
          <button type="button" onclick="pilihDokter('Gian')" id="btn-Gian" class="py-3.5 rounded-2xl border border-slate-100 bg-slate-50 text-center font-semibold text-slate-700 transition duration-200 active:scale-95 cursor-pointer">Gian</button>
          <button type="button" onclick="pilihDokter('Tiara')" id="btn-Tiara" class="py-3.5 rounded-2xl border border-slate-100 bg-slate-50 text-center font-semibold text-slate-700 transition duration-200 active:scale-95 cursor-pointer">Tiara</button>
        </div>
      </div>

      <div id="section-lokasi" class="mb-6 hidden opacity-0 transition-opacity duration-300">
        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-2.5">Lokasi Dinas</label>
        <div class="grid grid-cols-2 gap-3">
          <button type="button" onclick="pilihLokasi('RS')" id="btn-RS" class="py-3.5 rounded-2xl border border-slate-100 bg-slate-50 text-center font-semibold text-slate-700 transition duration-200 active:scale-95 cursor-pointer">Rumah Sakit</button>
          <button type="button" onclick="pilihLokasi('PKM')" id="btn-PKM" class="py-3.5 rounded-2xl border border-slate-100 bg-slate-50 text-center font-semibold text-slate-700 transition duration-200 active:scale-95 cursor-pointer">Puskesmas</button>
        </div>
      </div>

      <div id="section-tanggal" class="mb-6 hidden opacity-0 transition-opacity duration-300">
        <div class="flex items-center justify-between mb-3">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400 block">Sentuh Tanggal untuk Isi Shift</label>
          
          <select id="pilih-bulan" onchange="gantiBulanDinas()" class="text-xs font-bold text-slate-700 bg-slate-100 border-none px-3 py-1.5 rounded-xl cursor-pointer focus:outline-none">
            <option value="September 2026" selected>September 2026</option>
            <option value="Oktober 2026">Oktober 2026</option>
          </select>
        </div>
        <div class="grid grid-cols-7 gap-y-3 gap-x-1.5 text-center bg-slate-50 p-4 rounded-3xl border border-slate-100" id="tanggal-grid">
          </div>
      </div>
    </div>

    <div class="mt-4">
      <div id="rekap-container" class="hidden mb-4 max-h-40 overflow-y-auto p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-medium text-slate-600 space-y-1.5">
        </div>
      <button onclick="kirimDataFinal()" id="btn-submit" class="w-full py-4 bg-slate-200 text-slate-400 font-bold rounded-2xl text-center cursor-not-allowed" disabled>
        Konfirmasi Semua Jadwal
      </button>
    </div>

  </div>

  <div id="shift-drawer" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] shadow-[0_-15px_40px_rgba(0,0,0,0.08)] border-t border-slate-100 p-6 max-w-md mx-auto transform translate-y-full drawer-transition z-50">
    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>
    
    <div class="flex items-center justify-between mb-4">
      <div>
        <h3 class="text-base font-bold text-slate-800" id="drawer-title">Pilih Shift Tanggal</h3>
        <p class="text-xs text-slate-400 mt-0.5">Bisa memilih lebih dari 1 shift dalam satu hari</p>
      </div>
      <button onclick="simpanShiftTanggalTerpilih()" class="text-xs font-bold text-white bg-slate-800 px-4 py-2 rounded-xl active:scale-95 cursor-pointer">Simpan</button>
    </div>

    <div id="shift-singkatan-grid" class="grid grid-cols-3 gap-3 mb-4">
      </div>
  </div>

  <div id="drawer-overlay" onclick="tutupDrawer()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-xs hidden z-40 transition-opacity duration-300 opacity-0"></div>

  <script>
    const API_URL = 'PASTE_URL_WEB_APP_DI_SINI'; 

    let profilAktif = { namaDokter: '', lokasi: '' };
    let tanggalTerpilihSaatIni = null;
    let memoriJadwalSementera = {}; 

    const shiftDictionary = {
      'IGD_Pagi': 'P', 'IGD_Siang': 'S', 'IGD_Malam': 'M',
      'Klinik_Kejaksaan': 'Kj', 'Visite': 'Vis',
      'Ruangan_Pagi': 'PR', 'Ruangan_Siang': 'SR', 'Ruangan_Malam': 'MR',
      'OnCall_Pagi': 'Oc.P', 'OnCall_Siang': 'Oc.S', 'OnCall_Malam': 'Oc.M'
    };

    const shiftsAllowed = {
      'Gian_RS': ['IGD_Pagi', 'IGD_Siang', 'IGD_Malam', 'Klinik_Kejaksaan', 'Visite'],
      'Gian_PKM': ['IGD_Pagi', 'IGD_Siang', 'IGD_Malam', 'OnCall_Pagi', 'OnCall_Siang', 'OnCall_Malam'],
      'Tiara_RS': ['IGD_Pagi', 'IGD_Siang', 'IGD_Malam', 'Ruangan_Pagi', 'Ruangan_Siang', 'Ruangan_Malam']
    };

    function pilihDokter(nama) {
      profilAktif.namaDokter = nama;
      profilAktif.lokasi = '';
      memoriJadwalSementera = {}; 
      
      const drawer = document.getElementById('shift-drawer');
      if (drawer && !drawer.classList.contains('translate-y-full')) {
        drawer.classList.add('translate-y-full');
      }
      
      const overlay = document.getElementById('drawer-overlay');
      if (overlay) {
        overlay.classList.add('hidden');
        overlay.classList.add('opacity-0');
      }

      document.getElementById('section-lokasi').classList.add('hidden');
      document.getElementById('section-lokasi').classList.add('opacity-0');
      document.getElementById('section-tanggal').classList.add('hidden');
      document.getElementById('section-tanggal').classList.add('opacity-0');

      renderTanggalGridMurni();

      document.getElementById('btn-Gian').className = nama === 'Gian' ? 'py-3.5 rounded-2xl bg-blue-600 text-white font-bold shadow-[0_10px_20px_rgba(37,99,235,0.2)] cursor-pointer' : 'py-3.5 rounded-2xl bg-slate-50 border border-slate-100 text-slate-700 cursor-pointer';
      document.getElementById('btn-Tiara').className = nama === 'Tiara' ? 'py-3.5 rounded-2xl bg-pink-500 text-white font-bold shadow-[0_10px_20px_rgba(236,72,153,0.2)] cursor-pointer' : 'py-3.5 rounded-2xl bg-slate-50 border border-slate-100 text-slate-700 cursor-pointer';
      
      if (nama === 'Gian') {
        const secLokasi = document.getElementById('section-lokasi');
        secLokasi.classList.remove('hidden');
        setTimeout(() => secLokasi.classList.remove('opacity-0'), 30);
      } else {
        profilAktif.lokasi = 'RS'; 
        const secTanggal = document.getElementById('section-tanggal');
        secTanggal.classList.remove('hidden');
        setTimeout(() => secTanggal.classList.remove('opacity-0'), 30);
      }
      cekValiditasForm();
    }

    function pilihLokasi(lokasi) {
      profilAktif.lokasi = lokasi;
      memoriJadwalSementera = {};
      renderTanggalGridMurni();

      document.getElementById('btn-RS').className = lokasi === 'RS' ? 'py-3.5 rounded-2xl bg-slate-800 text-white font-bold shadow-md cursor-pointer' : 'py-3.5 rounded-2xl bg-slate-50 border border-slate-100 text-slate-700 cursor-pointer';
      document.getElementById('btn-PKM').className = lokasi === 'PKM' ? 'py-3.5 rounded-2xl bg-slate-800 text-white font-bold shadow-md cursor-pointer' : 'py-3.5 rounded-2xl bg-slate-50 border border-slate-100 text-slate-700 cursor-pointer';
      
      const secTanggal = document.getElementById('section-tanggal');
      secTanggal.classList.remove('hidden');
      setTimeout(() => secTanggal.classList.remove('opacity-0'), 30);
      cekValiditasForm();
    }

    // PENYESUAIAN LOGIKA: Bersihkan state tanggal jika user merubah pilihan target bulan dinas
    function gantiBulanDinas() {
      memoriJadwalSementera = {};
      renderTanggalGridMurni();
      cekValiditasForm();
    }

    function renderTanggalGridMurni() {
      const grid = document.getElementById('tanggal-grid');
      grid.innerHTML = '';
      
      // Menentukan jumlah tanggal maksimum (Oktober=31, September=30)
      const bulanTerpilih = document.getElementById('pilih-bulan').value;
      const jumlahHari = bulanTerpilih.includes("September") ? 30 : 31;

      for (let i = 1; i <= jumlahHari; i++) {
        grid.innerHTML += `
          <button type="button" onclick="klikTanggalSakti(${i})" id="tgl-${i}" class="w-10 h-10 mx-auto flex flex-col items-center justify-center rounded-full text-sm font-bold transition duration-150 active:scale-75 relative bg-transparent text-slate-700 cursor-pointer">
            <span>${i}</span>
            <span id="dot-indicator-${i}" class="w-1 h-1 rounded-full bg-transparent absolute bottom-1"></span>
          </button>`;
      }
    }

    function klikTanggalSakti(tgl) {
      tanggalTerpilihSaatIni = tgl;
      if (!memoriJadwalSementera[tgl]) {
        memoriJadwalSementera[tgl] = [];
      }
      bukaDrawerMultiShift(tgl);
    }

    function bukaDrawerMultiShift(tgl) {
      const bulanAktif = document.getElementById('pilih-bulan').value.split(" ")[0];
      document.getElementById('drawer-title').innerText = `Tanggal ${tgl} ${bulanAktif}`;
      const key = profilAktif.namaDokter + '_' + profilAktif.lokasi;
      const container = document.getElementById('shift-singkatan-grid');
      container.innerHTML = '';

      const arrayShiftAktifTanggalIni = memoriJadwalSementera[tgl];

      shiftsAllowed[key].forEach(shift => {
        const singkatan = shiftDictionary[shift] || shift;
        const isChecked = arrayShiftAktifTanggalIni.includes(shift);
        const warnaAktifTombol = profilAktif.namaDokter === 'Gian' ? 'bg-blue-600 text-white border-blue-600' : 'bg-pink-500 text-white border-pink-500';

        container.innerHTML += `
          <button type="button" onclick="toggleSelectionShiftMatiMatian('${shift}')" id="btn-drawer-shift-${shift}" class="py-3 rounded-xl border text-center text-sm font-bold transition cursor-pointer ${isChecked ? warnaAktifTombol : 'bg-slate-50 text-slate-700 border-slate-200'}">
            <div class="text-base">${singkatan}</div>
            <div class="text-[9px] opacity-60 font-medium tracking-tight mt-0.5 truncate">${shift.replace('_', ' ')}</div>
          </button>
        `;
      });

      const drawer = document.getElementById('shift-drawer');
      const overlay = document.getElementById('drawer-overlay');
      drawer.classList.remove('translate-y-full');
      overlay.classList.remove('hidden');
      setTimeout(() => overlay.classList.remove('opacity-0'), 10);
    }

    function toggleSelectionShiftMatiMatian(shift) {
      const arr = memoriJadwalSementera[tanggalTerpilihSaatIni];
      const idx = arr.indexOf(shift);
      const btn = document.getElementById(`btn-drawer-shift-${shift}`);
      const warnaWarni = profilAktif.namaDokter === 'Gian' ? 'bg-blue-600 text-white border-blue-600' : 'bg-pink-500 text-white border-pink-500';

      if (idx > -1) {
        arr.splice(idx, 1);
        btn.className = "py-3 rounded-xl border text-center text-sm font-bold transition cursor-pointer bg-slate-50 text-slate-700 border-slate-200";
      } else {
        arr.push(shift);
        btn.className = `py-3 rounded-xl border text-center text-sm font-bold transition cursor-pointer ${warnaWarni}`;
      }
    }

    function simpanShiftTanggalTerpilih() {
      const tgl = tanggalTerpilihSaatIni;
      const arr = memoriJadwalSementera[tgl];
      const tombolKalender = document.getElementById(`tgl-${tgl}`);
      const dotIndikator = document.getElementById(`dot-indicator-${tgl}`);

      if (arr && arr.length > 0) {
        if (profilAktif.namaDokter === 'Gian') {
          tombolKalender.className = "w-10 h-10 mx-auto flex flex-col items-center justify-center rounded-full text-sm font-black bg-blue-50 text-blue-600 border border-blue-200 relative cursor-pointer";
          dotIndikator.className = "w-1 h-1 rounded-full bg-blue-600 absolute bottom-1";
        } else {
          tombolKalender.className = "w-10 h-10 mx-auto flex flex-col items-center justify-center rounded-full text-sm font-black bg-pink-50 text-pink-600 border border-pink-200 relative cursor-pointer";
          dotIndikator.className = "w-1 h-1 rounded-full bg-pink-500 absolute bottom-1";
        }
      } else {
        delete memoriJadwalSementera[tgl];
        tombolKalender.className = "w-10 h-10 mx-auto flex flex-col items-center justify-center rounded-full text-sm font-bold text-slate-700 bg-transparent relative cursor-pointer";
        dotIndikator.className = "w-1 h-1 rounded-full bg-transparent absolute bottom-1";
      }

      tutupDrawer();
      cekValiditasForm();
    }

    function tutupDrawer() {
      const drawer = document.getElementById('shift-drawer');
      if (drawer) drawer.classList.add('translate-y-full');
      const overlay = document.getElementById('drawer-overlay');
      if (overlay) {
        overlay.classList.add('opacity-0');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      }
    }

    function resetSemua() {
      memoriJadwalSementera = {};
      renderTanggalGridMurni();
      tutupDrawer();
      cekValiditasForm();
    }

    function cekValiditasForm() {
      const btn = document.getElementById('btn-submit');
      const rekap = document.getElementById('rekap-container');
      const jumlahTanggalTerisi = Object.keys(memoriJadwalSementera).length;
      const bulanTerpilih = document.getElementById('pilih-bulan').value;

      if (profilAktif.namaDokter && profilAktif.lokasi && jumlahTanggalTerisi > 0) {
        rekap.classList.remove('hidden');
        rekap.innerHTML = `<div class='font-bold text-slate-800 mb-1'>Rangkuman Jadwal - ${bulanTerpilih} (${jumlahTanggalTerisi} Hari):</div>`;
        
        Object.keys(memoriJadwalSementera).sort((a,b)=>a-b).forEach(tgl => {
          const daftarSingkatan = memoriJadwalSementera[tgl].map(s => shiftDictionary[s]).join(' + ');
          rekap.innerHTML += `<div class='flex justify-between border-b border-slate-100 py-1'><span>📅 Tanggal ${tgl}</span> <span class='font-bold text-slate-700'>[ ${daftarSingkatan} ]</span></div>`;
        });

        btn.disabled = false;
        btn.className = "w-full py-4 bg-slate-900 text-white font-bold rounded-2xl shadow-xl transition cursor-pointer transform active:scale-[0.99]";
      } else {
        rekap.classList.add('hidden');
        btn.disabled = true;
        btn.className = "w-full py-4 bg-slate-200 text-slate-400 font-bold rounded-2xl text-center cursor-not-allowed";
      }
    }

    function kirimDataFinal() {
      const btn = document.getElementById('btn-submit');
      btn.innerText = "Mengirim Paket Jadwal...";
      btn.disabled = true;
      
      const bulanDinasTerpilih = document.getElementById('pilih-bulan').value;

      const paketKirim = {
        namaDokter: profilAktif.namaDokter,
        lokasi: profilAktif.lokasi,
        bulanDinas: bulanDinasTerpilih, // PARAMETER BARU CROSS-MONTH
        dataJadwal: memoriJadwalSementera 
      };

      fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(paketKirim)
      }).then(() => {
        alert("Sukses Ekstrim! Semua kombinasi multi-shift kalender berhasil disinkronkan.");
        location.reload();
      }).catch(err => {
        alert("Gagal sinkronisasi: " + err.message);
        btn.innerText = "Konfirmasi Semua Jadwal";
        btn.disabled = false;
        cekValiditasForm();
      });
    }
  </script>
</body>
</html>
