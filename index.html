<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Jadwal Jaga Medis</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Jadwal%20Jaga%22,%22short_name%22:%22JadwalJaga%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f8fafc%22,%22theme_color%22:%22%23f8fafc%22}">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .drawer-transition { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .toast-transition { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    /* Spinner kecil untuk indikator "sedang menyimpan" */
    .spinner { border: 2px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%;
      width: 14px; height: 14px; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center p-4 antialiased relative overflow-x-hidden">

  <div class="w-full max-w-md bg-white rounded-[2.5rem] p-6 shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-slate-100 mt-2 mb-6 flex flex-col justify-between min-h-[85vh]">

    <div>
      <div class="flex items-center justify-between mb-6">
        <div class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-50 border border-slate-100 text-slate-400" id="status-koneksi" title="Status koneksi ke server">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" /></svg>
        </div>
        <h1 class="text-lg font-bold text-slate-800 tracking-tight">Jadwal Jaga</h1>
        <div class="w-10"></div>
      </div>

      <div class="mb-6">
        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-2.5">Nama Dokter</label>
        <div class="grid grid-cols-2 gap-3">
          <button type="button" onclick="pilihDokter('Gian')" id="btn-Gian" class="py-3.5 rounded-2xl border border-slate-100 bg-slate-50 text-center font-semibold text-slate-700 transition duration-200 active:scale-95 cursor-pointer">Gian</button>
          <button type="button" onclick="pilihDokter('Tiara')" id="btn-Tiara" class="py-3.5 rounded-2xl border border-slate-100 bg-slate-50 text-center font-semibold text-slate-700 transition duration-200 active:scale-95 cursor-pointer">Tiara</button>
        </div>
      </div>

      <div id="section-lokasi" class="mb-6 hidden opacity-0 transition-opacity duration-300">
        <label class="text-xs font-bold uppercase tracking-wider text-slate-400 block mb-2.5">Lokasi Dinas</label>
        <div class="grid grid-cols-2 gap-3">
          <button type="button" onclick="pilihLokasi('RS')" id="btn-RS" class="py-3.5 rounded-2xl border border-slate-100 bg-slate-50 text-center font-semibold text-slate-700 transition duration-200 active:scale-95 cursor-pointer">Rumah Sakit</button>
          <button type="button" onclick="pilihLokasi('PKM')" id="btn-PKM" class="py-3.5 rounded-2xl border border-slate-100 bg-slate-50 text-center font-semibold text-slate-700 transition duration-200 active:scale-95 cursor-pointer">Puskesmas</button>
        </div>
      </div>

      <div id="section-tanggal" class="mb-6 hidden opacity-0 transition-opacity duration-300">
        <div class="flex items-center justify-between mb-4">
          <label class="text-xs font-bold uppercase tracking-wider text-slate-400 block">Pilih Tanggal Dinas</label>
          <div class="flex items-center gap-1 bg-slate-50 border border-slate-100 p-1 rounded-xl">
            <button type="button" onclick="navigasiBulan(-1)" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-white text-slate-500 active:scale-90 transition cursor-pointer">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
            </button>
            <span id="label-bulan-tahun" class="text-xs font-black text-slate-700 px-2 min-w-28 text-center tracking-tight">-</span>
            <button type="button" onclick="navigasiBulan(1)" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-white text-slate-500 active:scale-90 transition cursor-pointer">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-3.5 h-3.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>
            </button>
          </div>
        </div>

        <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100 relative">
          <div id="loading-overlay-kalender" class="hidden absolute inset-0 bg-white/70 rounded-3xl flex items-center justify-center z-10">
            <div class="flex items-center gap-2 text-xs font-bold text-slate-500">
              <span class="spinner" style="border-color: rgba(100,116,139,0.25); border-top-color: #64748b;"></span>
              Memuat jadwal tersimpan...
            </div>
          </div>
          <div class="grid grid-cols-7 gap-x-1.5 text-center mb-2.5 text-[11px] font-bold text-slate-400 tracking-wider">
            <div>S</div><div>S</div><div>R</div><div>K</div><div>J</div><div>S</div><div>M</div>
          </div>
          <div class="grid grid-cols-7 gap-y-3 gap-x-1.5 text-center" id="tanggal-grid"></div>
        </div>
      </div>
    </div>

    <div class="mt-4">
      <div id="rekap-container" class="hidden mb-2 max-h-40 overflow-y-auto p-4 bg-slate-50 border border-slate-100 rounded-2xl text-xs font-medium text-slate-600 space-y-1.5"></div>
      <p class="text-center text-[11px] text-slate-400 font-medium">Setiap perubahan tersimpan otomatis ke Google Calendar &mdash; tidak perlu tombol konfirmasi.</p>
    </div>

  </div>

  <div id="shift-drawer" class="fixed bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] shadow-[0_-15px_40px_rgba(0,0,0,0.08)] border-t border-slate-100 p-6 max-w-md mx-auto transform translate-y-full drawer-transition z-50">
    <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-4"></div>

    <div class="flex items-center justify-between mb-4">
      <div>
        <h3 class="text-base font-bold text-slate-800" id="drawer-title">Pilih Shift Tanggal</h3>
        <p class="text-xs text-slate-400 mt-0.5">Bisa memilih lebih dari 1 shift dalam satu hari</p>
      </div>
      <button onclick="simpanShiftTanggalTerpilih()" id="btn-simpan-drawer" class="text-xs font-bold text-white bg-slate-800 px-4 py-2 rounded-xl active:scale-95 cursor-pointer flex items-center gap-1.5 min-w-20 justify-center">Simpan</button>
    </div>

    <div id="shift-singkatan-grid" class="grid grid-cols-3 gap-3 mb-4"></div>
  </div>

  <div id="drawer-overlay" onclick="tutupDrawer()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-xs hidden z-40 transition-opacity duration-300 opacity-0"></div>

  <!-- Toast notifikasi ringan (pengganti alert() yang mengganggu UX) -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-24 opacity-0 toast-transition bg-slate-900 text-white text-sm font-semibold px-5 py-3 rounded-2xl shadow-xl z-[60] max-w-[90%] text-center"></div>

  <script>
    // =========================================================================
    // KONFIGURASI — GANTI 2 BARIS INI SESUAI DEPLOYMENT ANDA
    // =========================================================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbxRUo88Srq0g9PXA5YZyERnwm4kAuXsPgJlJzbNNyri8vwsNvpq5VC0p_l52x6aRqf8WA/exec'; // ...script.google.com/macros/s/XXXX/exec
    const API_KEY = 'jg-2026-x7Ka9mQp';         // harus SAMA PERSIS dengan Code.gs

    // =========================================================================
    // STATE APLIKASI
    // =========================================================================
    let profilAktif = { namaDokter: '', lokasi: '' };
    let tanggalTerpilihSaatIni = null;
    // Menyimpan shift per tanggal UNTUK PROFIL+BULAN YANG SEDANG AKTIF SAJA.
    // Ini adalah "cermin" dari data server: diisi via loadJadwalBulanIni(),
    // lalu diperbarui setiap kali simpanShiftTanggalTerpilih() berhasil.
    let memoriJadwalSementera = {};

    let bulanIndexAktif = new Date().getMonth();
    let tahunAktif = new Date().getFullYear();

    const namaBulanIndo = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

    const shiftDictionary = {
      'IGD_Pagi': 'P', 'IGD_Siang': 'S', 'IGD_Malam': 'M',
      'Klinik_Kejaksaan': 'Kj', 'Visite': 'Vis',
      'Ruangan_Pagi': 'PR', 'Ruangan_Siang': 'SR', 'Ruangan_Malam': 'MR',
      'OnCall_Pagi': 'Oc.P', 'OnCall_Siang': 'Oc.S', 'OnCall_Malam': 'Oc.M'
    };

    const shiftsAllowed = {
      'Gian_RS': ['IGD_Pagi', 'IGD_Siang', 'IGD_Malam', 'Klinik_Kejaksaan', 'Visite'],
      'Gian_PKM': ['IGD_Pagi', 'IGD_Siang', 'IGD_Malam', 'Visite', 'OnCall_Pagi', 'OnCall_Siang', 'OnCall_Malam'],
      'Tiara_RS': ['IGD_Pagi', 'IGD_Siang', 'IGD_Malam', 'Ruangan_Pagi', 'Ruangan_Siang', 'Ruangan_Malam']
    };

    // =========================================================================
    // UTILITAS — Toast & Pemanggilan API
    // =========================================================================

    function tampilkanToast(pesan, jenis = 'info') {
      const toast = document.getElementById('toast');
      const warna = jenis === 'error' ? 'bg-red-600' : (jenis === 'success' ? 'bg-emerald-600' : 'bg-slate-900');
      toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-0 opacity-100 toast-transition ${warna} text-white text-sm font-semibold px-5 py-3 rounded-2xl shadow-xl z-[60] max-w-[90%] text-center`;
      toast.innerText = pesan;
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => {
        toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-24 opacity-0 toast-transition bg-slate-900 text-white text-sm font-semibold px-5 py-3 rounded-2xl shadow-xl z-[60] max-w-[90%] text-center';
      }, 2600);
    }

    /**
     * Wrapper fetch ke Apps Script. Sengaja pakai GET (lihat penjelasan CORS
     * di Code.gs). `params` adalah object key-value yang akan jadi query string.
     */
    async function apiCall(params) {
      const query = new URLSearchParams({ ...params, key: API_KEY, _ts: Date.now() }).toString();
      const response = await fetch(`${API_URL}?${query}`, { method: 'GET' });
      if (!response.ok) throw new Error('HTTP ' + response.status);
      const data = await response.json();
      if (data.status !== 'success') throw new Error(data.message || 'Server menolak permintaan.');
      return data;
    }

    function tandaiKoneksi(sukses) {
      const el = document.getElementById('status-koneksi');
      el.className = `w-10 h-10 flex items-center justify-center rounded-full border ${sukses ? 'bg-emerald-50 border-emerald-100 text-emerald-500' : 'bg-red-50 border-red-100 text-red-500'}`;
    }

    // =========================================================================
    // PEMILIHAN PROFIL (DOKTER & LOKASI)
    // =========================================================================

    function pilihDokter(nama) {
      profilAktif.namaDokter = nama;
      profilAktif.lokasi = '';
      memoriJadwalSementera = {};
      tutupDrawer();

      document.getElementById('section-lokasi').classList.add('hidden', 'opacity-0');
      document.getElementById('section-tanggal').classList.add('hidden', 'opacity-0');

      document.getElementById('btn-Gian').className = nama === 'Gian'
        ? 'py-3.5 rounded-2xl bg-blue-600 text-white font-bold shadow-[0_10px_20px_rgba(37,99,235,0.2)] cursor-pointer'
        : 'py-3.5 rounded-2xl bg-slate-50 border border-slate-100 text-slate-700 cursor-pointer';
      document.getElementById('btn-Tiara').className = nama === 'Tiara'
        ? 'py-3.5 rounded-2xl bg-pink-500 text-white font-bold shadow-[0_10px_20px_rgba(236,72,153,0.2)] cursor-pointer'
        : 'py-3.5 rounded-2xl bg-slate-50 border border-slate-100 text-slate-700 cursor-pointer';

      if (nama === 'Gian') {
        // Gian punya 2 lokasi -> tunggu user pilih dulu.
        const secLokasi = document.getElementById('section-lokasi');
        secLokasi.classList.remove('hidden');
        setTimeout(() => secLokasi.classList.remove('opacity-0'), 30);
      } else {
        // Tiara hanya RS -> langsung set & lanjut ke kalender.
        profilAktif.lokasi = 'RS';
        tampilkanSectionTanggalDanMuatData();
      }
    }

    function pilihLokasi(lokasi) {
      profilAktif.lokasi = lokasi;
      memoriJadwalSementera = {};

      document.getElementById('btn-RS').className = lokasi === 'RS'
        ? 'py-3.5 rounded-2xl bg-slate-800 text-white font-bold shadow-md cursor-pointer'
        : 'py-3.5 rounded-2xl bg-slate-50 border border-slate-100 text-slate-700 cursor-pointer';
      document.getElementById('btn-PKM').className = lokasi === 'PKM'
        ? 'py-3.5 rounded-2xl bg-slate-800 text-white font-bold shadow-md cursor-pointer'
        : 'py-3.5 rounded-2xl bg-slate-50 border border-slate-100 text-slate-700 cursor-pointer';

      tampilkanSectionTanggalDanMuatData();
    }

    function tampilkanSectionTanggalDanMuatData() {
      const secTanggal = document.getElementById('section-tanggal');
      secTanggal.classList.remove('hidden');
      setTimeout(() => secTanggal.classList.remove('opacity-0'), 30);
      renderTanggalGridMurni();
      muatJadwalBulanIni();
    }

    // =========================================================================
    // KALENDER — Render grid & navigasi bulan
    // =========================================================================

    function navigasiBulan(arah) {
      bulanIndexAktif += arah;
      if (bulanIndexAktif > 11) { bulanIndexAktif = 0; tahunAktif += 1; }
      else if (bulanIndexAktif < 0) { bulanIndexAktif = 11; tahunAktif -= 1; }

      memoriJadwalSementera = {};
      renderTanggalGridMurni();
      if (profilAktif.namaDokter && profilAktif.lokasi) muatJadwalBulanIni();
    }

    function renderTanggalGridMurni() {
      document.getElementById('label-bulan-tahun').innerText = `${namaBulanIndo[bulanIndexAktif]} ${tahunAktif}`;

      const grid = document.getElementById('tanggal-grid');
      grid.innerHTML = '';

      const objekHariPertama = new Date(tahunAktif, bulanIndexAktif, 1);
      const dayOfWeek = objekHariPertama.getDay();
      const ruangKosongAwal = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      const jumlahHariNyata = new Date(tahunAktif, bulanIndexAktif + 1, 0).getDate();

      for (let p = 0; p < ruangKosongAwal; p++) {
        grid.innerHTML += `<div class="w-10 h-10"></div>`;
      }
      for (let i = 1; i <= jumlahHariNyata; i++) {
        grid.innerHTML += `
          <button type="button" onclick="klikTanggalSakti(${i})" id="tgl-${i}" class="w-10 h-10 mx-auto flex flex-col items-center justify-center rounded-full text-sm font-bold transition duration-150 active:scale-75 relative bg-transparent text-slate-700 cursor-pointer">
            <span>${i}</span>
            <span id="dot-indicator-${i}" class="w-1 h-1 rounded-full bg-transparent absolute bottom-1"></span>
          </button>`;
      }
    }

    /** Mewarnai ulang seluruh tombol tanggal berdasarkan isi memoriJadwalSementera saat ini. */
    function refreshTampilanDotSemuaTanggal() {
      const jumlahHariNyata = new Date(tahunAktif, bulanIndexAktif + 1, 0).getDate();
      for (let i = 1; i <= jumlahHariNyata; i++) {
        setTampilanDotTanggal(i, (memoriJadwalSementera[i] || []).length > 0);
      }
    }

    function setTampilanDotTanggal(tgl, terisi) {
      const tombolKalender = document.getElementById(`tgl-${tgl}`);
      const dotIndikator = document.getElementById(`dot-indicator-${tgl}`);
      if (!tombolKalender || !dotIndikator) return;

      if (terisi) {
        if (profilAktif.namaDokter === 'Gian') {
          tombolKalender.className = "w-10 h-10 mx-auto flex flex-col items-center justify-center rounded-full text-sm font-black bg-blue-50 text-blue-600 border border-blue-200 relative cursor-pointer";
          dotIndikator.className = "w-1 h-1 rounded-full bg-blue-600 absolute bottom-1";
        } else {
          tombolKalender.className = "w-10 h-10 mx-auto flex flex-col items-center justify-center rounded-full text-sm font-black bg-pink-50 text-pink-600 border border-pink-200 relative cursor-pointer";
          dotIndikator.className = "w-1 h-1 rounded-full bg-pink-500 absolute bottom-1";
        }
      } else {
        tombolKalender.className = "w-10 h-10 mx-auto flex flex-col items-center justify-center rounded-full text-sm font-bold text-slate-700 bg-transparent relative cursor-pointer";
        dotIndikator.className = "w-1 h-1 rounded-full bg-transparent absolute bottom-1";
      }
    }

    // =========================================================================
    // LOAD — Ambil jadwal tersimpan dari server (mengisi kalender saat dibuka)
    // =========================================================================

    async function muatJadwalBulanIni() {
      const overlay = document.getElementById('loading-overlay-kalender');
      overlay.classList.remove('hidden');
      try {
        const hasil = await apiCall({
          action: 'load',
          dokter: profilAktif.namaDokter,
          lokasi: profilAktif.lokasi,
          bulan: bulanIndexAktif + 1,
          tahun: tahunAktif
        });
        memoriJadwalSementera = hasil.data || {};
        refreshTampilanDotSemuaTanggal();
        perbaruiRekap();
        tandaiKoneksi(true);
      } catch (err) {
        tandaiKoneksi(false);
        tampilkanToast('Gagal memuat jadwal: ' + err.message, 'error');
      } finally {
        overlay.classList.add('hidden');
      }
    }

    // =========================================================================
    // DRAWER PEMILIHAN SHIFT (multi-select per tanggal)
    // =========================================================================

    function klikTanggalSakti(tgl) {
      tanggalTerpilihSaatIni = tgl;
      if (!memoriJadwalSementera[tgl]) memoriJadwalSementera[tgl] = [];
      bukaDrawerMultiShift(tgl);
    }

    function bukaDrawerMultiShift(tgl) {
      document.getElementById('drawer-title').innerText = `Tanggal ${tgl} ${namaBulanIndo[bulanIndexAktif]}`;

      const key = profilAktif.namaDokter + '_' + profilAktif.lokasi;
      const container = document.getElementById('shift-singkatan-grid');
      container.innerHTML = '';

      const shiftAktifTanggalIni = [...(memoriJadwalSementera[tgl] || [])];
      // Simpan salinan sebelum diedit, untuk kebutuhan "batalkan" jika simpan gagal.
      window.__shiftSebelumEdit = [...shiftAktifTanggalIni];
      memoriJadwalSementera[tgl] = shiftAktifTanggalIni;

      const warnaAktifTombol = profilAktif.namaDokter === 'Gian' ? 'bg-blue-600 text-white border-blue-600' : 'bg-pink-500 text-white border-pink-500';

      shiftsAllowed[key].forEach(shift => {
        const singkatan = shiftDictionary[shift] || shift;
        const isChecked = shiftAktifTanggalIni.includes(shift);
        container.innerHTML += `
          <button type="button" onclick="toggleSelectionShift('${shift}')" id="btn-drawer-shift-${shift}" class="py-3 rounded-xl border text-center text-sm font-bold transition cursor-pointer ${isChecked ? warnaAktifTombol : 'bg-slate-50 text-slate-700 border-slate-200'}">
            <div class="text-base">${singkatan}</div>
            <div class="text-[9px] opacity-60 font-medium tracking-tight mt-0.5 truncate">${shift.replace(/_/g, ' ')}</div>
          </button>`;
      });

      const drawer = document.getElementById('shift-drawer');
      const overlay = document.getElementById('drawer-overlay');
      drawer.classList.remove('translate-y-full');
      overlay.classList.remove('hidden');
      setTimeout(() => overlay.classList.remove('opacity-0'), 10);
    }

    function toggleSelectionShift(shift) {
      const arr = memoriJadwalSementera[tanggalTerpilihSaatIni];
      const idx = arr.indexOf(shift);
      const btn = document.getElementById(`btn-drawer-shift-${shift}`);
      const warnaWarni = profilAktif.namaDokter === 'Gian' ? 'bg-blue-600 text-white border-blue-600' : 'bg-pink-500 text-white border-pink-500';

      if (idx > -1) {
        arr.splice(idx, 1);
        btn.className = "py-3 rounded-xl border text-center text-sm font-bold transition cursor-pointer bg-slate-50 text-slate-700 border-slate-200";
      } else {
        arr.push(shift);
        btn.className = `py-3 rounded-xl border text-center text-sm font-bold transition cursor-pointer ${warnaWarni}`;
      }
    }

    /**
     * INTI PERBAIKAN: setiap tap "Simpan" langsung sync ke server (create/delete
     * event Calendar secara real-time), bukan menumpuk semua di 1 tombol akhir.
     */
    async function simpanShiftTanggalTerpilih() {
      const tgl = tanggalTerpilihSaatIni;
      const shiftTerpilih = memoriJadwalSementera[tgl] || [];
      const btn = document.getElementById('btn-simpan-drawer');
      const teksAsli = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      const tanggalISO = `${tahunAktif}-${String(bulanIndexAktif + 1).padStart(2, '0')}-${String(tgl).padStart(2, '0')}`;

      try {
        await apiCall({
          action: 'sync',
          dokter: profilAktif.namaDokter,
          lokasi: profilAktif.lokasi,
          tanggal: tanggalISO,
          shifts: shiftTerpilih.join(','),
          bulanDinas: `${namaBulanIndo[bulanIndexAktif]} ${tahunAktif}`
        });

        if (shiftTerpilih.length === 0) delete memoriJadwalSementera[tgl];
        setTampilanDotTanggal(tgl, shiftTerpilih.length > 0);
        perbaruiRekap();
        tandaiKoneksi(true);
        tampilkanToast('Tersimpan & disinkronkan ke Calendar ✓', 'success');
        tutupDrawer();
      } catch (err) {
        // Gagal -> kembalikan state lokal seperti sebelum drawer dibuka
        memoriJadwalSementera[tgl] = window.__shiftSebelumEdit;
        tandaiKoneksi(false);
        tampilkanToast('Gagal menyimpan: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = teksAsli;
      }
    }

    function tutupDrawer() {
      const drawer = document.getElementById('shift-drawer');
      if (drawer) drawer.classList.add('translate-y-full');
      const overlay = document.getElementById('drawer-overlay');
      if (overlay) {
        overlay.classList.add('opacity-0');
        setTimeout(() => overlay.classList.add('hidden'), 300);
      }
    }

    // =========================================================================
    // RINGKASAN (read-only, informatif — tidak ada lagi tombol submit manual)
    // =========================================================================

    function perbaruiRekap() {
      const rekap = document.getElementById('rekap-container');
      const tanggalTerisi = Object.keys(memoriJadwalSementera).filter(k => (memoriJadwalSementera[k] || []).length > 0);

      if (tanggalTerisi.length === 0) {
        rekap.classList.add('hidden');
        return;
      }

      rekap.classList.remove('hidden');
      rekap.innerHTML = `<div class='font-bold text-slate-800 mb-1'>Ringkasan ${namaBulanIndo[bulanIndexAktif]} ${tahunAktif} (${tanggalTerisi.length} hari):</div>`;
      tanggalTerisi.sort((a, b) => a - b).forEach(tgl => {
        const daftarSingkatan = memoriJadwalSementera[tgl].map(s => shiftDictionary[s] || s).join(' + ');
        rekap.innerHTML += `<div class='flex justify-between border-b border-slate-100 py-1'><span>📅 Tanggal ${tgl}</span><span class='font-bold text-slate-700'>[ ${daftarSingkatan} ]</span></div>`;
      });
    }
  </script>
</body>
</html>
